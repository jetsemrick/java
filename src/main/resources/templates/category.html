<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/head :: head(~{::title})}">
    <title>Category — Cursor Retro Parts</title>
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>
<main>
    <h1 th:text="${category.name}">Category</h1>
    <p class="lead"><a th:href="@{/}">&larr; Back to shop</a></p>
    <div class="card-grid">
        <article class="card" th:each="p : ${products}">
            <div class="card__title" th:text="${p.name}">Product</div>
            <div class="card__meta">
                <span class="pill" th:text="${p.sku}">SKU</span>
            </div>
            <p class="card__meta" th:text="${p.description}">Description</p>
            <div class="row" style="justify-content: space-between;">
                <span class="price" th:text="${#numbers.formatCurrency(p.price)}">$0.00</span>
                <a class="btn btn--ghost" th:href="@{/products/{id}(id=${p.id})}">Details</a>
            </div>
        </article>
    </div>
    <p th:if="${#lists.isEmpty(products)}" class="empty-state">No products in this category.</p>
</main>
<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
