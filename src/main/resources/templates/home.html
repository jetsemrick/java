<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/head :: head(~{::title})}">
    <title>Shop — Cursor Retro Parts</title>
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>
<main>
    <h1>Retro computer parts</h1>
    <p class="lead">Browse by category. Add to cart, adjust quantities, and complete a mock checkout — a multi-file
        Java demo that pairs domain logic with a Cursor-inspired UI.</p>

    <section th:each="cat : ${categories}">
        <h2>
            <a th:href="@{/categories/{id}(id=${cat.id})}" th:text="${cat.name}">Category</a>
        </h2>
        <div class="card-grid">
            <article class="card" th:each="p : ${cat.products}">
                <div class="card__title" th:text="${p.name}">Product</div>
                <div class="card__meta">
                    <span class="pill" th:text="${p.sku}">SKU</span>
                </div>
                <p class="card__meta" th:text="${p.description}">Description</p>
                <div class="row" style="justify-content: space-between;">
                    <span class="price" th:text="${#numbers.formatCurrency(p.price)}">$0.00</span>
                    <a class="btn btn--ghost" th:href="@{/products/{id}(id=${p.id})}">Details</a>
                </div>
            </article>
        </div>
    </section>
</main>
<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
